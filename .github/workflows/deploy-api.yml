name: Deploy API to Azure Container Apps

on:
  workflow_dispatch:
  push:
    branches: [main, gagan/ui-azure-integration]
    paths:
      - 'src/agentsentry/**'
      - 'Dockerfile'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Single production endpoint — all deploys require `prod` approval (see docs/AZURE_DEPLOY.md).
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ secrets.AZURE_ACR_NAME }} \
            --image agentsentry-api:${{ github.sha }} \
            --image agentsentry-api:latest \
            --file Dockerfile \
            .

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/agentsentry-api:latest
