name: Deploy Mission Control (Azure Static Web Apps)

on:
  workflow_dispatch:
  push:
    branches: [main, gagan/ui-azure-integration]
    paths:
      - 'mission-control/**'
      - '.github/workflows/azure-static-web-apps.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths:
      - 'mission-control/**'

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    # Push to main waits for a reviewer on the `prod` environment (see docs/AZURE_DEPLOY.md).
    environment: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'prod' || 'preview' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mission-control/package-lock.json

      - name: Patch API proxy in staticwebapp.config.json
        env:
          AGENTSENTRY_API_FQDN: ${{ secrets.AGENTSENTRY_API_FQDN }}
        run: |
          if [ -n "$AGENTSENTRY_API_FQDN" ]; then
            sed -i "s|REPLACE_WITH_ACA_FQDN|${AGENTSENTRY_API_FQDN}|g" mission-control/staticwebapp.config.json
          fi

      - name: Install dependencies
        working-directory: mission-control
        run: npm ci

      - name: Build Mission Control
        working-directory: mission-control
        env:
          NEXT_PUBLIC_API_URL: ''
          NEXT_PUBLIC_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          NEXT_PUBLIC_DEMO_MODE: ${{ vars.NEXT_PUBLIC_DEMO_MODE || 'true' }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: mission-control
          output_location: out
          skip_app_build: true
          # Build still passes if the token is missing; deploy is skipped until the secret exists.
          skip_deploy_on_missing_secrets: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Environment
    steps:
      - name: Close Static Web Apps PR environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
